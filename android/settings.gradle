pluginManagement {
  def resolveNodeExecutable = {
    def homeDir = System.getProperty("user.home")
    def candidates = [
      System.getenv("NODE_BINARY"),
      "/opt/homebrew/bin/node",
      "/usr/local/bin/node",
      "${homeDir}/.asdf/shims/node",
    ].findAll { it }

    def nvmVersionsDir = new File(homeDir, ".nvm/versions/node")
    if (nvmVersionsDir.isDirectory()) {
      def nvmCandidates = nvmVersionsDir.listFiles()
        ?.findAll { it.isDirectory() }
        ?.collect { new File(it, "bin/node") }
        ?.findAll { it.canExecute() }
        ?.sort { a, b -> b.name <=> a.name }
        ?.collect { it.absolutePath } ?: []
      candidates.addAll(nvmCandidates)
    }

    candidates.find { new File(it).canExecute() } ?: "node"
  }

  def nodeExecutable = resolveNodeExecutable()
  def version = providers.exec {
    commandLine(nodeExecutable, "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  includeBuild(new File([nodeExecutable, "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()).getParentFile().toString())
  includeBuild(
    new File(
      [nodeExecutable, "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim()
    ).getParentFile().toString() + "/android/expo-gradle-plugin"
  )
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins {
