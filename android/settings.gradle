def resolveNodeExecutable = {
  def homeDir = System.getProperty("user.home")
  def candidates = [
    System.getenv("NODE_BINARY"),
    "/opt/homebrew/bin/node",
    "/usr/local/bin/node",
    "${homeDir}/.asdf/shims/node",
  ].findAll { it }

  def nvmVersionsDir = new File(homeDir, ".nvm/versions/node")
  if (nvmVersionsDir.isDirectory()) {
    def nvmCandidates = nvmVersionsDir.listFiles()
      ?.findAll { it.isDirectory() }
      ?.collect { new File(it, "bin/node") }
      ?.findAll { it.canExecute() }
      ?.sort { a, b -> b.name <=> a.name }
      ?.collect { it.absolutePath } ?: []
    candidates.addAll(nvmCandidates)
  }

  candidates.find { new File(it).canExecute() } ?: "node"
}

def nodeExecutable = resolveNodeExecutable()

def getRNMinorVersion = {
  def version = providers.exec {
    commandLine(nodeExecutable, "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    if (System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') == '1') {
      println('\u001B[32mUsing expo-modules-autolinking as core autolinking source\u001B[0m')
      def command = [
        nodeExecutable,
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      ex.autolinkLibrariesFromCommand()
    }
  }
}

rootProject.name = 'MedControlApp'

dependencyResolutionManagement {
